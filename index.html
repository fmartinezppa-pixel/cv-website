<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Acceso | Franco Martinez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .gate-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .gate-card{ width:100%; max-width:380px; background:var(--black-card); border:1px solid var(--border-soft); border-radius:var(--radius); padding:44px 32px; text-align:center; }
  .gate-icon{ font-size:2rem; display:inline-block; margin-bottom:18px; color:var(--blue); transform:rotate(45deg); }
  .gate-card h1{ font-size:1.25rem; margin:0 0 10px; letter-spacing:.02em; font-weight:600; }
  .gate-card p{ color:var(--gray-300); font-size:.88rem; margin:0 0 28px; line-height:1.6; }
  .gate-form{ display:flex; flex-direction:column; gap:14px; }
  .gate-input{ width:100%; background:var(--black); border:1px solid var(--border-soft); color:var(--white); font-family:'Archivo',sans-serif; font-size:1rem; letter-spacing:.35em; text-align:center; padding:14px 12px; border-radius:var(--radius); outline:none; transition:border-color .2s; }
  .gate-input:focus{ border-color:var(--blue); }
  .gate-error{ color:#ff5b5b; font-size:.82rem; min-height:1.2em; display:none; }
  .gate-error.show{ display:block; }
  .gate-btn{ width:100%; justify-content:center; cursor:pointer; }
</style>
</head>
<body>

<div class="gate-wrap">
  <div class="gate-card">
    <span class="gate-icon">&#9992;</span>
    <h1>Franco Martinez</h1>
    <p>Este sitio contiene información personal. Ingresá el código de acceso para continuar.</p>
    <form class="gate-form" id="gateForm" autocomplete="off">
      <input class="gate-input" id="gateInput" type="password" inputmode="numeric" placeholder="Código de acceso" required>
      <button class="btn btn-primary gate-btn" type="submit">Ingresar</button>
      <div class="gate-error" id="gateError">Código incorrecto. Probá de nuevo.</div>
    </form>
  </div>
</div>

<script src="js/gate.js"></script>
</body>
</html>
